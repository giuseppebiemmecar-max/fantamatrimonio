<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Fantamatrimonio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root{--gold:#c9a84c;--bg:#080806;--bg2:#0f0e0b;--bg3:#161410;--border:rgba(201,168,76,.2);--border2:rgba(201,168,76,.08);--text:#f0e8d0;--text2:#a09070;--text3:#6a5a3a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;padding:1.5rem}
    h1{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);margin-bottom:4px}
    .sub{font-size:13px;color:var(--text3);margin-bottom:2rem;font-style:italic}
    .max{max-width:680px;margin:0 auto}

    /* login */
    #login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:320px;text-align:center}
    .login-box h2{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:1rem}
    .login-box input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:3px}
    .login-box input:focus{border-color:var(--gold)}

    /* buttons */
    .btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;transition:all .2s}
    .btn-gold{background:linear-gradient(135deg,var(--gold),#a8823a);color:#1a1400;font-weight:700}
    .btn-gold:hover{opacity:.9;transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-danger{background:transparent;border:1px solid rgba(200,60,60,.3);color:#c84040}
    .btn-danger:hover{background:rgba(200,60,60,.1)}
    .btn-sm{padding:6px 12px;font-size:11px}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* stats */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
    .stat{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px;text-align:center}
    .stat-n{font-family:'Cinzel',serif;font-size:26px;color:var(--gold);font-weight:700}
    .stat-l{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

    /* tabs */
    .tabs{display:flex;gap:8px;margin-bottom:1.5rem}
    .tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:'Cinzel',serif;font-size:12px;cursor:pointer;transition:all .2s}
    .tab.active{background:var(--gold);color:#1a1400;border-color:var(--gold);font-weight:700}

    /* questions */
    .q-admin{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
    .q-admin-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .q-admin-text{font-style:italic;font-size:16px;flex:1;margin-right:12px;line-height:1.4}
    .q-badge{font-size:10px;padding:3px 10px;border-radius:20px;white-space:nowrap;font-family:'Cinzel',serif;letter-spacing:.5px}
    .q-badge.open{background:rgba(106,191,75,.15);color:#6abf4b;border:1px solid rgba(106,191,75,.3)}
    .q-badge.solved{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid var(--border)}
    .opt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .opt-label{flex:1;font-size:14px;color:var(--text2)}
    .opt-count{font-size:12px;color:var(--text3);min-width:60px;text-align:right}
    .opt-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;max-width:80px}
    .opt-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
    .btn-pick{padding:4px 10px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:'Crimson Pro',serif;font-size:12px;cursor:pointer;transition:all .15s}
    .btn-pick:hover{border-color:var(--gold);color:var(--gold)}
    .btn-pick.picked{border-color:#6abf4b;color:#6abf4b;background:rgba(106,191,75,.08)}
    .confirm-btn{width:100%;padding:10px;margin-top:12px;background:#2a5010;color:white;border:none;border-radius:9px;font-family:'Cinzel',serif;font-size:12px;cursor:pointer;letter-spacing:.5px;transition:all .2s}
    .confirm-btn:hover:not(:disabled){background:#1e3a0c}
    .confirm-btn:disabled{opacity:.3;cursor:not-allowed}
    .solved-tag{display:inline-block;background:rgba(201,168,76,.1);color:var(--gold);border:1px solid var(--border);border-radius:20px;font-size:12px;padding:4px 12px;margin-top:8px}

    /* users */
    .user-row{display:flex;align-items:center;gap:10px;padding:.75rem 0;border-bottom:1px solid var(--border2)}
    .user-row:last-child{border-bottom:none}
    .u-avatar{width:36px;height:36px;border-radius:50%;background:rgba(201,168,76,.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:13px;color:var(--gold);flex-shrink:0}
    .u-avatar.banned{background:rgba(200,60,60,.1);color:#c84040}
    .u-info{flex:1}
    .u-name{font-size:14px;display:flex;align-items:center;gap:6px}
    .banned-tag{font-size:9px;background:rgba(200,60,60,.15);color:#c84040;border-radius:8px;padding:1px 6px}
    .u-meta{font-size:11px;color:var(--text3);margin-top:1px;font-style:italic}
    .u-pts{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);min-width:36px;text-align:right}
    .user-search{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'Crimson Pro',serif;font-size:14px;outline:none;margin-bottom:12px}
    .user-search:focus{border-color:var(--gold)}

    /* classifica admin */
    .lb-toggle{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .lb-toggle-info h3{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:4px}
    .lb-toggle-info p{font-size:13px;color:var(--text2);font-style:italic;line-height:1.4}
    .toggle-big{width:56px;height:30px;border-radius:15px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .3s}
    .toggle-big.on{background:var(--gold)}
    .toggle-big.off{background:var(--bg3)}
    .toggle-dot{width:24px;height:24px;background:white;border-radius:50%;position:absolute;top:3px;transition:left .3s}
    .toggle-big.on .toggle-dot{left:29px}
    .toggle-big.off .toggle-dot{left:3px}

    .card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;overflow:hidden}
    .lb-row-admin{display:flex;align-items:center;padding:.7rem 1rem;border-bottom:1px solid var(--border2)}
    .lb-row-admin:last-child{border-bottom:none}
  </style>
</head>
<body>

<div id="login-wrap">
  <div class="login-box">
    <div style="font-size:32px;margin-bottom:1rem">💍</div>
    <h2>Admin</h2>
    <p style="font-size:13px;color:var(--text3);margin-bottom:1rem;font-style:italic">Accesso riservato agli sposi</p>
    <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn btn-gold" style="width:100%" onclick="checkPw()">Accedi</button>
  </div>
</div>

<div id="admin-wrap" style="display:none">
  <div class="max">
    <h1>💍 Pannello Admin</h1>
    <p class="sub">Giuseppe & Sofia · Fantamatrimonio 2026</p>

    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-users">0</div><div class="stat-l">Invitati</div></div>
      <div class="stat"><div class="stat-n" id="st-votes">0</div><div class="stat-l">Voti totali</div></div>
      <div class="stat"><div class="stat-n" id="st-solved">0</div><div class="stat-l">Risolte</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('domande',this)">Domande</button>
      <button class="tab" onclick="showTab('classifica',this)">Classifica</button>
      <button class="tab" onclick="showTab('utenti',this)">Utenti</button>
    </div>

    <div id="tab-domande">
      <div id="q-list"></div>
    </div>

    <div id="tab-classifica" style="display:none">
      <div class="lb-toggle">
        <div class="lb-toggle-info">
          <h3>Sblocca classifica</h3>
          <p>Quando la attivi, tutti gli invitati potranno vedere la classifica finale con i punteggi</p>
        </div>
        <button class="toggle-big off" id="lb-toggle-btn" onclick="toggleLeaderboard()">
          <div class="toggle-dot"></div>
        </button>
      </div>
      <div class="card">
        <div id="admin-lb"></div>
      </div>
    </div>

    <div id="tab-utenti" style="display:none">
      <input class="user-search" type="text" placeholder="Cerca per nome…" oninput="filterUsers(this.value)">
      <div class="card" style="padding:0 1rem">
        <div id="admin-users"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ══ FIREBASE CONFIG ══
const firebaseConfig = {
  apiKey: "AIzaSyCmrLyzKYtZraDtWoU3KGaqOFVV4wKUWCs",
  authDomain: "frantamatrimonio.firebaseapp.com",
  projectId: "frantamatrimonio",
  storageBucket: "frantamatrimonio.firebasestorage.app",
  messagingSenderId: "225931901296",
  appId: "1:225931901296:web:05cb2996263bbb5dce77b5"

};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ══ PASSWORD ══ cambia questa!
const ADMIN_PASSWORD = 'sposi2026';

const QUESTIONS = [
  { id:'q01', text:'Quante volte Sofia cambierà outfit durante il giorno?', options:['Solo l\'abito da sposa','2 outfit','3 o più'] },
  { id:'q02', text:'Il discorso del testimone farà piangere o ridere di più?', options:['Soprattutto piangere','Soprattutto ridere','Metà e metà'] },
  { id:'q03', text:'Qualcuno rovescerà qualcosa sul vestito?', options:['Sì, uno sposo','Sì, un invitato','No, nessun incidente'] },
  { id:'q04', text:'La sposa arriverà in ritardo alla cerimonia?', options:['Sì, in ritardo','No, puntuale','Anticipa tutti'] },
  { id:'q05', text:'Chi piangerà per primo tra gli sposi?', options:['Giuseppe','Sofia','Entrambi insieme'] },
  { id:'q06', text:'L\'anello andrà al dito al primo colpo?', options:['Sì, liscio','No, un po\' di fatica'] },
  { id:'q07', text:'Quante portate prima che qualcuno si alzi a ballare?', options:['Già all\'antipasto','Al primo','Al secondo','Al dolce'] },
  { id:'q08', text:'Quale parente ballerà in modo più epico?', options:['Uno zio','Un nonno','Il papà di Giuseppe','Il papà di Sofia'] },
  { id:'q09', text:'Qualcuno si toglierà le scarpe entro le 22?', options:['Sì, prima delle 22','Sì, dopo le 22','No, resistono tutti'] },
  { id:'q10', text:'Il DJ replicherà almeno una canzone due volte?', options:['Sì','No'] },
  { id:'q11', text:'Ci sarà almeno un ballo di gruppo (Macarena, YMCA…)?', options:['Sì','No, niente balli di gruppo'] },
  { id:'q12', text:'Qual è la prima cosa che faranno gli sposi appena soli?', options:['Mangiano qualcosa','Crollano a dormire','Si mettono a ballare','Guardano le foto'] },
  { id:'q13', text:'Chi dei due si ricorderà più dettagli del matrimonio il giorno dopo?', options:['Giuseppe','Sofia','Pari pari'] },
];

let qStates={}, allUsers=[], selectedAnswers={}, lbOn=false, userFilter='';

function checkPw(){
  if(document.getElementById('pw').value===ADMIN_PASSWORD){
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('admin-wrap').style.display='block';
    initAdmin();
  } else { alert('Password errata!'); }
}

function initAdmin(){
  db.collection('questions').onSnapshot(snap=>{
    snap.forEach(doc=>{ qStates[doc.id]=doc.data(); });
    renderQuestions();
    document.getElementById('st-solved').textContent=`${Object.values(qStates).filter(q=>q.correct).length}/${QUESTIONS.length}`;
  });
  db.collection('users').orderBy('pts','desc').onSnapshot(snap=>{
    allUsers=[];
    snap.forEach(doc=>allUsers.push({id:doc.id,...doc.data()}));
    document.getElementById('st-users').textContent=allUsers.filter(u=>!u.banned).length;
    renderAdminLb();
    renderAdminUsers();
  });
  db.collection('votes').onSnapshot(snap=>{
    document.getElementById('st-votes').textContent=snap.size;
  });
  db.collection('settings').doc('app').onSnapshot(doc=>{
    lbOn=doc.exists&&doc.data().lbUnlocked;
    const btn=document.getElementById('lb-toggle-btn');
    btn.className=`toggle-big ${lbOn?'on':'off'}`;
  });
}

function renderQuestions(){
  document.getElementById('q-list').innerHTML=QUESTIONS.map(q=>{
    const state=qStates[q.id]||{};
    const correct=state.correct;
    const votes=state.votes||{};
    const total=Object.values(votes).reduce((a,b)=>a+b,0);
    const picked=selectedAnswers[q.id];

    const opts=q.options.map(opt=>{
      const cnt=votes[opt]||0;
      const pct=total>0?Math.round(cnt/total*100):0;
      const isPicked=picked===opt;
      const isCorrect=correct===opt;
      return `<div class="opt-row">
        <span class="opt-label" style="${isCorrect?'color:#6abf4b;font-weight:500':''}">${opt}${isCorrect?' ✓':''}</span>
        <span class="opt-count">${cnt} (${pct}%)</span>
        <div class="opt-bar"><div class="opt-bar-fill" style="width:${pct}%"></div></div>
        ${!correct?`<button class="btn-pick ${isPicked?'picked':''}" onclick="pickAnswer('${q.id}','${opt.replace(/'/g,"\\'")}')">
          ${isPicked?'✓ Scelta':'Segna'}
        </button>`:''}
      </div>`;
    }).join('');

    return `<div class="q-admin">
      <div class="q-admin-head">
        <div class="q-admin-text">"${q.text}"</div>
        <span class="q-badge ${correct?'solved':'open'}">${correct?'Risolta':'Aperta'}</span>
      </div>
      ${opts}
      ${!correct?`<button class="confirm-btn" id="cfm-${q.id}" ${!picked?'disabled':''} onclick="confirmAnswer('${q.id}')">
        ✓ Conferma risposta e assegna punti
      </button>`:`<div class="solved-tag">🏆 Risposta corretta: "${correct}"</div>`}
    </div>`;
  }).join('');
}

function pickAnswer(qid,opt){
  selectedAnswers[qid]=opt;
  renderQuestions();
}

async function confirmAnswer(qid){
  const opt=selectedAnswers[qid];
  if(!opt) return;
  const q=QUESTIONS.find(q=>q.id===qid);
  if(!confirm(`Confermi che la risposta corretta è:\n"${opt}"?\n\nI punti verranno assegnati subito.`)) return;

  await db.collection('questions').doc(qid).set({correct:opt},{merge:true});

  const votes=await db.collection('votes').where('qid','==',qid).where('option','==',opt).get();
  const batch=db.batch();
  votes.forEach(doc=>{
    batch.update(db.collection('users').doc(doc.data().userId),{
      pts:firebase.firestore.FieldValue.increment(10),
      correct:firebase.firestore.FieldValue.increment(1)
    });
  });
  await batch.commit();
  delete selectedAnswers[qid];
  alert(`✅ ${votes.size} invitati hanno guadagnato 10 punti!`);
}

async function toggleLeaderboard(){
  await db.collection('settings').doc('app').set({lbUnlocked:!lbOn},{merge:true});
}

function renderAdminLb(){
  const active=allUsers.filter(u=>!u.banned);
  const medals=['🥇','🥈','🥉'];
  document.getElementById('admin-lb').innerHTML=active.map((u,i)=>`
    <div class="lb-row-admin">
      <span style="font-size:18px;min-width:32px">${medals[i]||(i+1)+'°'}</span>
      <span style="flex:1;font-size:14px;margin-left:6px">${u.name}${u.banned?'<span class="banned-tag">rimosso</span>':''}</span>
      <span style="font-size:12px;color:var(--text3);margin-right:12px">${u.correct||0} corrette</span>
      <span style="font-family:'Cinzel',serif;font-size:17px;color:var(--gold)">${u.pts||0}</span>
    </div>`).join('')||'<p style="padding:1rem;text-align:center;color:var(--text3);font-style:italic">Nessun utente ancora</p>';
}

function filterUsers(v){ userFilter=v.toLowerCase(); renderAdminUsers(); }

function renderAdminUsers(){
  const list=allUsers.filter(u=>!userFilter||u.name.toLowerCase().includes(userFilter));
  document.getElementById('admin-users').innerHTML=list.map(u=>{
    const initials=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const date=u.joinedAt?new Date(u.joinedAt.seconds*1000).toLocaleDateString('it-IT'):'—';
    return `<div class="user-row">
      <div class="u-avatar ${u.banned?'banned':''}">${u.banned?'🚫':initials}</div>
      <div class="u-info">
        <div class="u-name">${u.name}${u.banned?'<span class="banned-tag">rimosso</span>':''}</div>
        <div class="u-meta">${u.correct||0} corrette · iscritto ${date}</div>
      </div>
      <span class="u-pts">${u.banned?'':u.pts||0}</span>
      ${u.banned
        ?`<button class="btn btn-outline btn-sm" onclick="restoreUser('${u.id}','${u.name.replace(/'/g,"\\'")}')">Ripristina</button>`
        :`<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${u.name.replace(/'/g,"\\'")}')">Elimina</button>`}
    </div>`;
  }).join('')||'<p style="padding:1rem;text-align:center;color:var(--text3);font-style:italic">Nessun utente trovato</p>';
}

async function deleteUser(id,name){
  if(!confirm(`Rimuovere "${name}" dalla classifica?`)) return;
  await db.collection('users').doc(id).update({banned:true});
}
async function restoreUser(id,name){
  if(!confirm(`Ripristinare "${name}"?`)) return;
  await db.collection('users').doc(id).update({banned:false});
}

function showTab(name,btn){
  ['domande','classifica','utenti'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
